# JORAN Pocket — mobile-friendly tmux config
# Installed by setup-services.sh to ~/.tmux.conf (old file backed up if present).

# --- Prefix ------------------------------------------------------------
set -g prefix C-a
bind C-a send-prefix
set -g prefix2 C-b

# --- Mouse -------------------------------------------------------------
set -g mouse on

# --- Sensible defaults -------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"

# --- Copy mode ---------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Reload config -----------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux reloaded"

# --- Splits ------------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# --- Two-line status bar ----------------------------------------------
# Line 0 (top): POCKET branding + session + window tabs
# Line 1 (bottom): tappable phone key bar — ↑ ↓ ← → ⎋ ⇥ ⏎
set -g status 2
set -g status-interval 2
set -g status-justify left
set -g status-position bottom
set -g status-style "bg=#0b0d12,fg=#e6e6e6"

set -g status-left-length 50
set -g status-left "#[fg=#f97316,bold] POCKET #[fg=#525252]│#[fg=#e6e6e6] #S #[fg=#525252]│ "

set -g status-right-length 20
set -g status-right "#[fg=#525252]%H:%M "

setw -g window-status-format "#[fg=#525252] #I:#W "
setw -g window-status-current-format "#[bg=#f97316,fg=#0b0d12,bold] #I:#W #[default]"
setw -g window-status-separator ""

# Second status line: the phone key bar
set -g status-format[1] "#[align=centre,bg=#111319]#[range=user|up,fg=#f97316,bold]  ↑  #[norange]#[fg=#525252]│#[range=user|down,fg=#f97316,bold]  ↓  #[norange]#[fg=#525252]│#[range=user|left,fg=#f97316,bold]  ←  #[norange]#[fg=#525252]│#[range=user|right,fg=#f97316,bold]  →  #[norange]#[fg=#525252]│#[range=user|esc,fg=#f97316,bold]  ⎋  #[norange]#[fg=#525252]│#[range=user|tab,fg=#f97316,bold]  ⇥  #[norange]#[fg=#525252]│#[range=user|cr,fg=#f97316,bold]  ⏎  #[norange]"

# --- Pane borders ------------------------------------------------------
set -g pane-border-style "fg=#1e1e1e"
set -g pane-active-border-style "fg=#f97316"

# --- Message style -----------------------------------------------------
set -g message-style "bg=#f97316,fg=#0b0d12,bold"

# --- Mouse: status bar interactions ------------------------------------
# Double-tap the status bar to spawn a new window (phone-friendly).
bind -n DoubleClick1Status new-window

# Single-tap handling:
#   - window label → select that window (preserves default)
#   - user|<key>   → send the corresponding key into the active pane
bind -n MouseDown1Status run-shell -b "case '#{mouse_status_range}' in up) tmux send-keys Up ;; down) tmux send-keys Down ;; left) tmux send-keys Left ;; right) tmux send-keys Right ;; esc) tmux send-keys Escape ;; tab) tmux send-keys Tab ;; cr) tmux send-keys Enter ;; window) tmux select-window -t:#{mouse_window} ;; esac"
bind -n MouseDown1StatusRight run-shell -b "case '#{mouse_status_range}' in up) tmux send-keys Up ;; down) tmux send-keys Down ;; left) tmux send-keys Left ;; right) tmux send-keys Right ;; esc) tmux send-keys Escape ;; tab) tmux send-keys Tab ;; cr) tmux send-keys Enter ;; esac"

# --- Activity notifications --------------------------------------------
setw -g monitor-activity on
set -g visual-activity off
